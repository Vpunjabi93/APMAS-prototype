    <!-- FAQ JSON-LD -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "Do I have time for this alongside a full-time job?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "It's built for one: 3 hours a week, Saturday evenings, live online, over 12 months. Steady and additive — not a sprint that wrecks your quarter."
          }
        },
        {
          "@type": "Question",
          "name": "Will an online certificate actually carry weight?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "This is a live, cohort-based IIM Kozhikode programme with faculty-led sessions, a 2-day campus immersion and a graded Capstone — not passive recorded content. The credential is from a top-3 (NIRF 2025) institute."
          }
        },
        {
          "@type": "Question",
          "name": "I'm in sales, not marketing. Is this too marketing-heavy?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "No. Dedicated modules cover sales analytics, lead scoring, revenue enablement and go-to-market. Integrating sales with marketing and analytics is the whole point."
          }
        },
        {
          "@type": "Question",
          "name": "Another IIM has a cheaper AI-marketing course. Why this one?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Those typically teach you to think strategically about AI in 4–6 months. This is 12 months and 120 hours of actually building, deploying and automating a growth engine — and it includes sales and GTM, not just marketing. Different depth, different outcome."
          }
        },
        {
          "@type": "Question",
          "name": "Will the tools be outdated by the time I finish?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "You learn tool-agnostic frameworks (5A, full-funnel, GTM) taught through a current, faculty-updated stack — so you learn to choose and route tools, not memorise one that changes next quarter."
          }
        },
        {
          "@type": "Question",
          "name": "Am I eligible?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "You need a graduate degree plus either 2 years in a marketing/sales function or 5 years in a managerial role. Not sure how your profile fits? Ask a counsellor when you enquire."
          }
        }
      ]
    }
    </script>
